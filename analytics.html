<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="p-3">

<div class="container">

<h3>📈 Analytics</h3>

<button class="btn btn-secondary mb-3"
onclick="location.href='index.html'">
← กลับหน้าหลัก
</button>

<div class="card p-3 mb-3">

    <h5>📈 กำไร / ขาดทุน รายเดือน</h5>

    <canvas id="monthChart"></canvas>

</div>

<!-- Top Profit -->
<div class="card p-3 mb-3">

    <h5>🏆 หุ้นที่กำไรมากที่สุด</h5>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Symbol</th>
                <th class="text-end">กำไร</th>
            </tr>
        </thead>
        <tbody id="topProfitTable"></tbody>
    </table>

</div>

<!-- Top Loss -->
<div class="card p-3 mb-3">

    <h5>📉 หุ้นที่ขาดทุนมากที่สุด</h5>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Symbol</th>
                <th class="text-end">ขาดทุน</th>
            </tr>
        </thead>
        <tbody id="topLossTable"></tbody>
    </table>

</div>

<!-- Most Trade -->
<div class="card p-3 mb-3">

    <h5>🔥 หุ้นที่ซื้อขายบ่อยที่สุด</h5>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Symbol</th>
                <th class="text-end">จำนวนครั้ง</th>
            </tr>
        </thead>
        <tbody id="mostTradeTable"></tbody>
    </table>

</div>

</div>

<script src="analytics.js"></script>

</body>
</html>
